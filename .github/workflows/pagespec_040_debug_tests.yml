name: Debug PageSpec 0.4.0 tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1
      - name: Prepare patched source
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet gdown pyyaml
          gdown 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O delivery.zip
          unzip -q delivery.zip -d delivery
          SOURCE_ZIP="$(find delivery -type f -name '*完整源码*vendor*.zip' | head -n 1)"
          unzip -q "$SOURCE_ZIP" -d work
          ROOT="$(dirname "$(find work -type f -name manifest.yaml | head -n 1)")"
          python - <<'PY'
          from pathlib import Path
          patch=Path('.ci/pagespec_040_patch.py');text=patch.read_text(encoding='utf-8')
          text=text.replace("bridge = f'''<style>",'bridge = f"""<style>').replace("</script>'''\n        html =",'</script>"""\n        html =')
          text=text.replace("child-src 'none'; \\n        \\\"frame-src","child-src 'none'; \\\"\\n        \\\"frame-src")
          text=text.replace("child-src blob:; \\n        \\\"frame-src","child-src blob:; \\\"\\n        \\\"frame-src")
          Path('/tmp/patch.py').write_text(text,encoding='utf-8')
          PY
          python /tmp/patch.py "$ROOT"
          echo "ROOT=$ROOT" >> "$GITHUB_ENV"
      - name: Run tests and capture full result
        shell: bash
        run: |
          set +e
          cd "$ROOT"
          python -m unittest discover -s tests -p 'test_*.py' > "$GITHUB_WORKSPACE/tests.log" 2>&1
          status=$?
          echo "$status" > "$GITHUB_WORKSPACE/tests.status"
          tail -n 80 "$GITHUB_WORKSPACE/tests.log"
          exit 0
      - name: Persist concise test log
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64,json,pathlib,os
          payload={"message":"test: store PageSpec 0.4.0 diagnostics [skip ci]","content":base64.b64encode(pathlib.Path('tests.log').read_bytes()).decode('ascii'),"branch":os.environ['TARGET_BRANCH']}
          pathlib.Path('payload.json').write_text(json.dumps(payload),encoding='utf-8')
          PY
          endpoint="repos/${GITHUB_REPOSITORY}/contents/.ci/generated/pagespec_040_tests.log"
          existing="$(gh api "${endpoint}?ref=${TARGET_BRANCH}" --jq '.sha' 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            python - "$existing" <<'PY'
          import json,pathlib,sys
          p=json.loads(pathlib.Path('payload.json').read_text());p['sha']=sys.argv[1];pathlib.Path('payload.json').write_text(json.dumps(p))
          PY
          fi
          gh api "$endpoint" --method PUT --input payload.json >/dev/null
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: pagespec-040-test-log
          path: |
            tests.log
            tests.status
          if-no-files-found: error
          retention-days: 1
      - name: Enforce test status
        shell: bash
        run: |
          test "$(cat tests.status)" = "0"
