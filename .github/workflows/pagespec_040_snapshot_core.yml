name: Snapshot PageSpec core files

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download verified source
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet gdown
          gdown 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O delivery.zip
          test "$(sha256sum delivery.zip | awk '{print $1}')" = "378f1822d2f0d28e893d40dea41dd4fd98dd9c9ae54e13ccc725db5ffa55b3b8"
          unzip -q delivery.zip -d delivery
          SOURCE_ZIP="$(find delivery -type f -name '*完整源码*vendor*.zip' | head -n 1)"
          unzip -q "$SOURCE_ZIP" -d source
          ROOT="$(dirname "$(find source -type f -name manifest.yaml | head -n 1)")"
          echo "ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Commit missing core files
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          put_file() {
            local rel="$1" local_file="$ROOT/$1" repo_path=".ci/generated/pagespec_034_source/$1"
            test -f "$local_file"
            local content encoded_path existing_sha endpoint
            content="$(base64 -w0 "$local_file")"
            encoded_path="$(python -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe="/"))' "$repo_path")"
            endpoint="repos/${GITHUB_REPOSITORY}/contents/${encoded_path}"
            existing_sha="$(gh api "${endpoint}?ref=${TARGET_BRANCH}" --jq '.sha' 2>/dev/null || true)"
            if [ -n "$existing_sha" ]; then
              gh api "$endpoint" --method PUT -f message='ci: store PageSpec core source [skip ci]' -f content="$content" -f branch="$TARGET_BRANCH" -f sha="$existing_sha" >/dev/null
            else
              gh api "$endpoint" --method PUT -f message='ci: store PageSpec core source [skip ci]' -f content="$content" -f branch="$TARGET_BRANCH" >/dev/null
            fi
          }
          put_file tools/pagespec_validate.py
          put_file tools/render_page.py
          put_file tools/render_page.yaml
