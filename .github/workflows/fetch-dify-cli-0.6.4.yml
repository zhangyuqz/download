name: Fetch official Dify CLI 0.6.4

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Download official Linux amd64 CLI
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-delay 2 \
            --output dify-plugin-linux-amd64 \
            https://github.com/langgenius/dify-plugin-daemon/releases/download/0.6.4/dify-plugin-linux-amd64
          chmod 0755 dify-plugin-linux-amd64
          ./dify-plugin-linux-amd64 version | tee VERSION.txt
          sha256sum dify-plugin-linux-amd64 | tee SHA256SUMS.txt

      - name: Upload verified CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dify-plugin-cli-0.6.4-linux-amd64
          path: |
            dify-plugin-linux-amd64
            VERSION.txt
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 1
