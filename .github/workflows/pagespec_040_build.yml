name: Build PageSpec 0.4.0 delivery

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout build scripts only
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Download and extract verified PageSpec 0.3.4 baseline
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet gdown pyyaml
          gdown 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O baseline_delivery.zip
          test "$(sha256sum baseline_delivery.zip | awk '{print $1}')" = "378f1822d2f0d28e893d40dea41dd4fd98dd9c9ae54e13ccc725db5ffa55b3b8"
          unzip -t baseline_delivery.zip >/dev/null
          unzip -q baseline_delivery.zip -d baseline_delivery
          SOURCE_ZIP="$(find baseline_delivery -type f -name '*完整源码*vendor*.zip' | head -n 1)"
          test -n "$SOURCE_ZIP"
          mkdir -p work
          unzip -q "$SOURCE_ZIP" -d work
          ROOT="$(dirname "$(find work -type f -name manifest.yaml | head -n 1)")"
          test -n "$ROOT"
          echo "PLUGIN_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "Plugin root: $ROOT"

      - name: Repair build-script delimiters and apply 0.4.0 patch
        shell: python
        run: |
          from pathlib import Path
          patch = Path('.ci/pagespec_040_patch.py')
          text = patch.read_text(encoding='utf-8')
          text = text.replace("bridge = f'''<style>", 'bridge = f"""<style>')
          text = text.replace("</script>'''\n        html =", '</script>"""\n        html =')
          text = text.replace("child-src 'none'; \\n        \\\"frame-src", "child-src 'none'; \\\"\\n        \\\"frame-src")
          text = text.replace("child-src blob:; \\n        \\\"frame-src", "child-src blob:; \\\"\\n        \\\"frame-src")
          Path('/tmp/pagespec_040_patch.py').write_text(text, encoding='utf-8')
        
      - name: Apply source changes
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile /tmp/pagespec_040_patch.py
          python /tmp/pagespec_040_patch.py "$PLUGIN_ROOT"

      - name: Add focused 0.4.0 regression tests
        shell: bash
        run: |
          set -euo pipefail
          cat > "$PLUGIN_ROOT/tests/test_pagespec_040_showcase.py" <<'PY'
          # -*- coding: utf-8 -*-
          from __future__ import annotations
          import json, sys, types, unittest
          from pathlib import Path
          ROOT=Path(__file__).resolve().parents[1];TOOLS=ROOT/'tools';sys.path.insert(0,str(TOOLS))
          class StubTool:
              def __init__(self,*args,**kwargs): pass
              def create_text_message(self,text): return {'kind':'text','text':text}
              def create_blob_message(self,blob,meta): return {'kind':'blob','blob':blob,'meta':meta}
          dify=types.ModuleType('dify_plugin');dify.Tool=StubTool;sys.modules.setdefault('dify_plugin',dify)
          entities=types.ModuleType('dify_plugin.entities');toolmod=types.ModuleType('dify_plugin.entities.tool');toolmod.ToolInvokeMessage=dict
          sys.modules.setdefault('dify_plugin.entities',entities);sys.modules.setdefault('dify_plugin.entities.tool',toolmod)
          import render_page
          class ShowcaseTests(unittest.TestCase):
              def test_business_report_can_embed_all_172_libraries(self):
                  tool=render_page.RenderPageTool()
                  spec={'version':1,'doc':{'title':'年度报告'},'blocks':[{'type':'text','text':'正文'}]}
                  messages=list(tool._invoke({'spec':json.dumps(spec,ensure_ascii=False),'include_all_libraries':True,'filename':'report.html'}))
                  self.assertEqual(['text','blob'],[item['kind'] for item in messages])
                  html=messages[1]['blob'].decode('utf-8')
                  self.assertIn('ps-showcase',html);self.assertIn('ps-catalog-overlay',html)
                  self.assertIn('172 个库全部封装在本报告中',html)
                  self.assertIn('DecompressionStream',html)
                  self.assertLess(len(messages[1]['blob']),30_000_000)
                  self.assertNotIn('html,body{overflow-x:hidden',html)
              def test_wide_table_is_local_scroll_not_root_clipping(self):
                  tool=render_page.RenderPageTool()
                  spec={'version':1,'blocks':[{'type':'table','columns':['A','B','C','D','E','F'],'rows':[[1,2]],'features':['search','sort']}]}
                  html=list(tool._invoke({'spec':json.dumps(spec)}))[1]['blob'].decode('utf-8')
                  self.assertIn('overscroll-behavior-inline:contain',html)
                  self.assertIn('min-width:840px',html)
                  self.assertIn('行字段数 2 与列数 6 不一致',html)
          if __name__=='__main__': unittest.main()
          PY

      - name: Compile and run source tests
        shell: bash
        run: |
          set -euo pipefail
          find "$PLUGIN_ROOT" -type f -name '*.py' -not -path '*/vendor/*' -print0 | xargs -0 python -m py_compile
          cd "$PLUGIN_ROOT"
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Verify frozen library registry and package cleanliness
        shell: python
        run: |
          import json, pathlib, sys
          root=pathlib.Path(__import__('os').environ['PLUGIN_ROOT'])
          registry=json.loads((root/'catalog/registry.json').read_text(encoding='utf-8'))
          covers=registry['covers']
          assert len(covers)==172 and len(set(covers))==172
          counts=[item['count'] for item in registry['volumes']]
          assert counts==[35,63,41,33],counts
          assert (root/'requirements.txt').read_text(encoding='utf-8').strip()=='dify_plugin>=0.9.0'
          assert not list(root.rglob('__pycache__'))
          print('catalog=172 counts=',counts)

      - name: Package with official stable Dify CLI 0.6.1
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-delay 2 -o dify-plugin-linux-amd64 \
            https://github.com/langgenius/dify-plugin-daemon/releases/download/0.6.1/dify-plugin-linux-amd64
          chmod 0755 dify-plugin-linux-amd64
          ./dify-plugin-linux-amd64 version | tee CLI_VERSION.txt
          mkdir -p dist
          ./dify-plugin-linux-amd64 plugin package "$PLUGIN_ROOT" \
            -o dist/html_offline_exporter_PageSpec_0.4.0_Dify1.7.1_SDK0.9plus.difypkg --max-size 50

      - name: Audit final difypkg and real SDK registration
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE=dist/html_offline_exporter_PageSpec_0.4.0_Dify1.7.1_SDK0.9plus.difypkg
          test -f "$PACKAGE"
          test "$(stat -c%s "$PACKAGE")" -lt 15728640
          unzip -t "$PACKAGE" >/dev/null
          mkdir -p package_unpacked
          unzip -q "$PACKAGE" -d package_unpacked
          UNPACKED_BYTES="$(find package_unpacked -type f -printf '%s\n' | awk '{s+=$1}END{print s+0}')"
          test "$UNPACKED_BYTES" -lt 50000000
          test "$(cat package_unpacked/requirements.txt | tr -d '\r\n')" = 'dify_plugin>=0.9.0'
          python -m venv sdk_venv
          sdk_venv/bin/pip install --quiet 'dify_plugin==0.9.1'
          (
            cd package_unpacked
            ../sdk_venv/bin/python - <<'PY'
          from dify_plugin import Plugin, DifyPluginEnv
          plugin=Plugin(DifyPluginEnv(MAX_REQUEST_TIMEOUT=180))
          assert plugin.registration is not None
          print('PluginRegistration: PASS')
          PY
          )
          printf '%s' "$UNPACKED_BYTES" > UNPACKED_BYTES.txt

      - name: Generate two SHA-bound full-library workflows
        shell: python
        run: |
          from pathlib import Path
          import hashlib, os, re, yaml
          package=Path('dist/html_offline_exporter_PageSpec_0.4.0_Dify1.7.1_SDK0.9plus.difypkg')
          package_sha=hashlib.sha256(package.read_bytes()).hexdigest()
          identifier=f'zhangyu/html_offline_exporter:0.4.0@{package_sha}'
          delivery=Path('baseline_delivery')
          library=next(delivery.rglob('PageSpec_城市公共图书馆年度阅读与活动报告_样例_Dify1.7.1.yml'))
          phone=next(delivery.rglob('手机号一键查询并生成报告_PageSpec0.3.4_Dify1.7.1.yml'))
          old_id=re.compile(r'zhangyu/html_offline_exporter:[0-9.]+@[0-9a-f]{64}')
          def transform(value):
              if isinstance(value,str): return old_id.sub(identifier,value)
              if isinstance(value,list): return [transform(item) for item in value]
              if isinstance(value,dict): return {key:transform(item) for key,item in value.items()}
              return value
          def build(src,out,name,desc):
              doc=transform(yaml.safe_load(src.read_text(encoding='utf-8')))
              doc['app']['name']=name;doc['app']['description']=desc
              dependencies=doc.get('dependencies') or []
              found_dep=False
              for dep in dependencies:
                  value=dep.get('value') if isinstance(dep,dict) else None
                  if isinstance(value,dict) and ('html_offline_exporter' in str(value.get('plugin_unique_identifier','')) or value.get('plugin_id')=='zhangyu/html_offline_exporter'):
                      value['plugin_unique_identifier']=identifier;found_dep=True
              if not found_dep: raise RuntimeError('PageSpec plugin dependency not found')
              tool_count=0
              for node in doc['workflow']['graph']['nodes']:
                  data=node.get('data') or {}
                  if data.get('type')=='tool' and data.get('tool_name')=='render_page':
                      data.setdefault('tool_configurations',{})['include_all_libraries']={'type':'constant','value':True}
                      tool_count+=1
              if tool_count<1: raise RuntimeError('render_page tool node not found')
              strings=[]
              def walk(v):
                  if isinstance(v,str): strings.append(len(v))
                  elif isinstance(v,list):
                      for x in v: walk(x)
                  elif isinstance(v,dict):
                      for x in v.values(): walk(x)
              walk(doc)
              if max(strings,default=0)>=80000: raise RuntimeError('YML string reaches Dify 80000 limit')
              Path(out).write_text(yaml.safe_dump(doc,allow_unicode=True,sort_keys=False,width=1000),encoding='utf-8')
              return tool_count,max(strings,default=0)
          lib_out=Path('dist/PageSpec_城市公共图书馆年度阅读与活动报告_全库版_0.4.0_Dify1.7.1.yml')
          phone_out=Path('dist/手机号一键查询并生成报告_PageSpec全库版_0.4.0_Dify1.7.1.yml')
          lib_result=build(library,lib_out,'城市公共图书馆年度阅读与活动报告·172库全能力版','结构化图书馆年度报告与四卷172库全能力展示位于同一离线HTML；一次只运行一卷。')
          phone_result=build(phone,phone_out,'手机号一键查询并生成报告·PageSpec 0.4.0全库版','保留原业务节点与两条报告分支，并在每份离线HTML中封装四卷172库能力展示。')
          Path('PLUGIN_IDENTIFIER.txt').write_text(identifier+'\n',encoding='utf-8')
          Path('YML_AUDIT.txt').write_text(f'library={lib_result}\nphone={phone_result}\n',encoding='utf-8')

      - name: Build source and complete delivery archives
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_ZIP=dist/PageSpec_0.4.0_完整源码_含vendor.zip
          (cd "$(dirname "$PLUGIN_ROOT")" && zip -qr "$GITHUB_WORKSPACE/$SOURCE_ZIP" "$(basename "$PLUGIN_ROOT")")
          python - <<'PY'
          from pathlib import Path
          import hashlib,json,os,zipfile,yaml
          dist=Path('dist'); package=dist/'html_offline_exporter_PageSpec_0.4.0_Dify1.7.1_SDK0.9plus.difypkg'
          files=[package,dist/'PageSpec_城市公共图书馆年度阅读与活动报告_全库版_0.4.0_Dify1.7.1.yml',dist/'手机号一键查询并生成报告_PageSpec全库版_0.4.0_Dify1.7.1.yml',dist/'PageSpec_0.4.0_完整源码_含vendor.zip']
          rows=[]
          for path in files:
              digest=hashlib.sha256(path.read_bytes()).hexdigest();rows.append(f'{digest}  {path.name}')
              if path.suffix in {'.zip','.difypkg'}:
                  with zipfile.ZipFile(path) as zf:
                      assert zf.testzip() is None and len(zf.namelist())==len(set(zf.namelist()))
          (dist/'PageSpec_0.4.0_SHA256SUMS.txt').write_text('\n'.join(rows)+'\n',encoding='utf-8')
          report={'version':'0.4.0','package_bytes':package.stat().st_size,'package_sha256':hashlib.sha256(package.read_bytes()).hexdigest(),'unpacked_bytes':int(Path('UNPACKED_BYTES.txt').read_text()),'cli_version':Path('CLI_VERSION.txt').read_text().strip(),'catalog_counts':[35,63,41,33],'catalog_total':172,'requirements':'dify_plugin>=0.9.0','yml_max_string_under_80000':True,'html_reject_bytes':30000000}
          (dist/'PageSpec_0.4.0_交付验证摘要.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          mkdir -p complete/安装包 complete/工作流 complete/源码 complete/验证
          cp dist/*.difypkg complete/安装包/
          cp dist/*.yml complete/工作流/
          cp dist/*源码*.zip complete/源码/
          cp dist/*SHA256SUMS.txt dist/*验证摘要.json complete/验证/
          (cd complete && zip -qr ../dist/PageSpec_0.4.0_完整交付包_推荐.zip .)
          unzip -t dist/PageSpec_0.4.0_完整交付包_推荐.zip >/dev/null

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG=pagespec-0.4.0
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag >/dev/null 2>&1 || true
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "${{ github.head_ref }}" --title 'PageSpec 0.4.0 delivery' --notes 'PageSpec 0.4.0 compatibility-preserving refactor. Preserves the 0.3.x JSON/YML contract and frozen 172-library registry; adds isolated all-library showcase and responsive table fixes.'
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" dist/* --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PageSpec-0.4.0-delivery
          path: dist/*
          if-no-files-found: error
          retention-days: 7
