name: Audit PageSpec 0.4.0 Release

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout audit scripts
        uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.0-20260720
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download final release assets and verified 0.3.4 baseline
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download pagespec-0.4.0 --repo "$GITHUB_REPOSITORY" --dir assets
          python -m pip install --quiet gdown pyyaml
          gdown 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O baseline_delivery.zip
          test "$(sha256sum baseline_delivery.zip | awk '{print $1}')" = "378f1822d2f0d28e893d40dea41dd4fd98dd9c9ae54e13ccc725db5ffa55b3b8"

      - name: Audit final files, hashes, package/source parity, workflows and transport
        shell: bash
        run: |
          set +e
          python .ci/pagespec_040_post_release_audit.py \
            --assets assets \
            --baseline baseline_delivery.zip \
            --output post_release_audit.json \
            > post_release_audit.log 2>&1
          status=$?
          echo "$status" > static_audit.status
          cat post_release_audit.log
          exit 0

      - name: Re-run all tests from the released source ZIP
        shell: bash
        run: |
          set +e
          mkdir source_unpack
          unzip -q "assets/PageSpec_0.4.0_完整源码_含vendor.zip" -d source_unpack
          SOURCE_ROOT="$(dirname "$(find source_unpack -type f -name manifest.yaml | head -n 1)")"
          echo "$SOURCE_ROOT" > source_root.txt
          (cd "$SOURCE_ROOT" && python -m unittest discover -s tests -p 'test_*.py') > source_tests.log 2>&1
          status=$?
          echo "$status" > source_tests.status
          tail -n 100 source_tests.log
          exit 0

      - name: Verify current official Dify CLI and real SDK registration/startup
        shell: bash
        run: |
          set +e
          latest="$(curl -fsSL https://api.github.com/repos/langgenius/dify-plugin-daemon/releases/latest | python -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          echo "$latest" > official_cli_latest.txt
          curl -fsSL -o dify-plugin-linux-amd64 "https://github.com/langgenius/dify-plugin-daemon/releases/download/${latest}/dify-plugin-linux-amd64"
          chmod +x dify-plugin-linux-amd64
          ./dify-plugin-linux-amd64 version > official_cli_version.txt 2>&1
          cli_status=$?

          rm -rf package_unpack && mkdir package_unpack
          unzip -q "assets/html_offline_exporter_PageSpec_0.4.0_Dify1.7.1_SDK0.9plus.difypkg" -d package_unpack
          python -m venv sdk_venv
          sdk_venv/bin/pip install --quiet 'dify_plugin==0.9.1'
          (
            cd package_unpack
            ../sdk_venv/bin/python - <<'PY'
          from dify_plugin import Plugin, DifyPluginEnv
          plugin = Plugin(DifyPluginEnv(MAX_REQUEST_TIMEOUT=180))
          assert plugin.registration is not None
          print('PluginRegistration=PASS')
          PY
          ) > sdk_registration.log 2>&1
          sdk_status=$?
          (
            cd package_unpack
            timeout 5s ../sdk_venv/bin/python -m main
          ) > sdk_stdio.stdout 2> sdk_stdio.stderr
          stdio_status=$?
          if [ "$stdio_status" = 124 ] || [ "$stdio_status" = 0 ]; then
            stdio_ok=0
          else
            stdio_ok="$stdio_status"
          fi
          if [ -s sdk_stdio.stderr ]; then
            stdio_ok=1
          fi
          printf 'latest=%s\ncli_status=%s\nsdk_status=%s\nstdio_status=%s\n' "$latest" "$cli_status" "$sdk_status" "$stdio_status" | tee runtime_status.txt
          test "$cli_status" = 0 && test "$sdk_status" = 0 && test "$stdio_ok" = 0
          echo $? > runtime.status
          exit 0

      - name: Upload complete audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PageSpec-0.4.0-post-release-audit
          path: |
            post_release_audit.json
            post_release_audit.log
            static_audit.status
            source_tests.log
            source_tests.status
            source_root.txt
            official_cli_latest.txt
            official_cli_version.txt
            sdk_registration.log
            sdk_stdio.stdout
            sdk_stdio.stderr
            runtime_status.txt
            runtime.status
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce audit result
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat static_audit.status)" = 0
          test "$(cat source_tests.status)" = 0
          test "$(cat runtime.status)" = 0
