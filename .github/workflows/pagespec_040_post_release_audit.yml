name: Audit PageSpec 0.4.0 Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout audit scripts
        uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.0-20260720
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download final release assets and verified 0.3.4 baseline
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download pagespec-0.4.0 --repo "$GITHUB_REPOSITORY" --dir assets
          python -m pip install --quiet gdown pyyaml
          gdown 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O baseline_delivery.zip
          test "$(sha256sum baseline_delivery.zip | awk '{print $1}')" = "378f1822d2f0d28e893d40dea41dd4fd98dd9c9ae54e13ccc725db5ffa55b3b8"

      - name: Audit final files, hashes, package/source parity, workflows and transport
        shell: bash
        run: python .ci/pagespec_040_post_release_audit.py --assets assets --baseline baseline_delivery.zip --output post_release_audit.json
