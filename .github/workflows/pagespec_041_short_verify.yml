name: Verify Generated PageSpec 0.4.1 Source

on:
  pull_request:
    branches:
      - main
    paths:
      - '.ci/pagespec_041_prepare_patch_v2.py'
      - '.ci/pagespec_041_post_patch_fix_v2.py'
      - '.github/workflows/pagespec_041_short_verify.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.1-20260721
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate exact patched source and prove vendor bytes unchanged
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "HEAD=$(git rev-parse HEAD)"
          sha256sum .ci/pagespec_041_patch.py .ci/pagespec_041_prepare_patch_v2.py .ci/pagespec_041_post_patch_fix_v2.py
          mkdir baseline
          gh release download pagespec-0.4.0 --repo "$GITHUB_REPOSITORY" --pattern '*vendor.zip' --dir baseline
          SOURCE_ZIP="$(find baseline -type f -name '*.zip' | head -n 1)"
          test "$(sha256sum "$SOURCE_ZIP" | awk '{print $1}')" = '04096a862e7c9d16d3a430666797b648f68cc74d3332f369b55e17969d189aa6'
          unzip -q "$SOURCE_ZIP" -d work
          ROOT="$(dirname "$(find work -type f -name manifest.yaml | head -n 1)")"
          echo "PLUGIN_ROOT=$ROOT" >> "$GITHUB_ENV"
          find "$ROOT/vendor" -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > vendor_before.sha
          python -m pip install --quiet pyyaml
          python .ci/pagespec_041_prepare_patch_v2.py --source .ci/pagespec_041_patch.py --output /tmp/pagespec_041_patch.py
          python /tmp/pagespec_041_patch.py "$ROOT"
          python .ci/pagespec_041_post_patch_fix_v2.py "$ROOT"
          find "$ROOT/vendor" -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum > vendor_after.sha
          cmp vendor_before.sha vendor_after.sha
          grep -F 'def _build_catalog_volume(self, volume: int, inherited_nonce: str)' "$ROOT/tools/render_page.py"
          grep -F 'class CatalogScriptNonceAudit(HTMLParser)' "$ROOT/tools/render_page.py"
          if grep -F 'html = re.sub(r"<script' "$ROOT/tools/render_page.py"; then exit 1; fi

      - name: Compile and run complete source tests
        shell: bash
        run: |
          set -euo pipefail
          find "$PLUGIN_ROOT" -type f -name '*.py' -not -path '*/vendor/*' -print0 | xargs -0 python -m py_compile
          cd "$PLUGIN_ROOT"
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Verify transport matrix and extract actual script elements
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p catalog_scripts
          python - <<'PY'
          import base64,gzip,json,os,sys,types,urllib.parse,zlib
          from html.parser import HTMLParser
          from pathlib import Path
          root=Path(os.environ['PLUGIN_ROOT']);sys.path.insert(0,str(root/'tools'))
          class StubTool:
              def __init__(self,*a,**k): pass
              def create_text_message(self,text): return {'kind':'text','text':text}
              def create_blob_message(self,blob,meta): return {'kind':'blob','blob':blob,'meta':meta}
          dify=types.ModuleType('dify_plugin');dify.Tool=StubTool
          entities=types.ModuleType('dify_plugin.entities');toolmod=types.ModuleType('dify_plugin.entities.tool');toolmod.ToolInvokeMessage=dict
          sys.modules['dify_plugin']=dify;sys.modules['dify_plugin.entities']=entities;sys.modules['dify_plugin.entities.tool']=toolmod
          import pagespec_transport,render_page
          value={'version':1,'blocks':[{'type':'text','text':'编码容错'}]};text=json.dumps(value,ensure_ascii=False,separators=(',',':'))
          cases={
            'strict':text,
            'output':json.dumps({'output':text},ensure_ascii=False),
            'percent':urllib.parse.quote(text,safe=''),
            'base64':base64.b64encode(text.encode()).decode(),
            'urlsafe':base64.urlsafe_b64encode(text.encode()).decode().rstrip('='),
            'gzip':base64.b64encode(gzip.compress(text.encode(),mtime=0)).decode(),
            'zlib':base64.b64encode(zlib.compress(text.encode())).decode(),
            'data':'data:application/json;base64,'+base64.b64encode(text.encode()).decode(),
            'nested':base64.b64encode(base64.b64encode(text.encode())).decode(),
          }
          for name,raw in cases.items():
              outcome=pagespec_transport.parse_spec(raw)
              assert outcome.error is None and outcome.value==value,(name,outcome.error,outcome.value)
          plain='SGVsbG8gV29ybGQ=';outcome=pagespec_transport.parse_spec(plain)
          assert outcome.error is None and outcome.value['blocks'][0]['text']==plain
          payload=render_page.RenderPageTool()._build_catalog_volume(1,'short-verify-nonce')
          html=gzip.decompress(base64.b64decode(payload['gzip_b64'])).decode('utf-8')
          class Collector(HTMLParser):
              def __init__(self): super().__init__(convert_charrefs=False);self.current=None;self.scripts=[]
              def handle_starttag(self,tag,attrs):
                  if str(tag).lower()=='script':
                      amap=dict(attrs);self.current={'nonce':amap.get('nonce'),'type':amap.get('type',''),'parts':[]}
              def handle_data(self,data):
                  if self.current is not None:self.current['parts'].append(data)
              def handle_entityref(self,name):
                  if self.current is not None:self.current['parts'].append('&'+name+';')
              def handle_charref(self,name):
                  if self.current is not None:self.current['parts'].append('&#'+name+';')
              def handle_endtag(self,tag):
                  if str(tag).lower()=='script' and self.current is not None:
                      self.current['source']=''.join(self.current.pop('parts'));self.scripts.append(self.current);self.current=None
          collector=Collector();collector.feed(html);collector.close()
          executable=[item for item in collector.scripts if item['type'].split(';',1)[0].strip().lower() not in {'application/json','application/ld+json'}]
          assert len(executable)>10,len(executable)
          assert all(item['nonce']=='short-verify-nonce' for item in executable),sorted(set(str(item['nonce']) for item in executable))
          directory=Path('catalog_scripts')
          for index,item in enumerate(executable,1):(directory/f'{index:03d}.js').write_text(item['source'],encoding='utf-8')
          Path('short_verify.json').write_text(json.dumps({'transport':list(cases),'script_count':len(executable),'nonces':sorted(set(item['nonce'] for item in executable))},ensure_ascii=False,indent=2),encoding='utf-8')
          print(Path('short_verify.json').read_text(encoding='utf-8'))
          PY

      - name: Check every actual executable script with Node
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' file; do
            node --check "$file"
            count=$((count+1))
          done < <(find catalog_scripts -type f -name '*.js' -print0 | sort -z)
          test "$count" -gt 10
          echo "node_checked_scripts=$count"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PageSpec-0.4.1-short-verify
          path: |
            short_verify.json
            vendor_before.sha
            vendor_after.sha
          if-no-files-found: warn
          retention-days: 7
