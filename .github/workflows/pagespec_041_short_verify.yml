name: Verify Generated PageSpec 0.4.1 Source

on:
  pull_request:
    branches:
      - main
    paths:
      - '.ci/pagespec_041_prepare_patch.py'
      - '.ci/pagespec_041_post_patch_fix.py'
      - '.github/workflows/pagespec_041_short_verify.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.1-20260721
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate the patched source and capture exact output
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          {
            set -x
            echo "HEAD=$(git rev-parse HEAD)"
            sha256sum .ci/pagespec_041_patch.py .ci/pagespec_041_prepare_patch.py .ci/pagespec_041_post_patch_fix.py
            mkdir baseline
            gh release download pagespec-0.4.0 --repo "$GITHUB_REPOSITORY" --pattern '*vendor.zip' --dir baseline
            SOURCE_ZIP="$(find baseline -type f -name '*.zip' | head -n 1)"
            test "$(sha256sum "$SOURCE_ZIP" | awk '{print $1}')" = '04096a862e7c9d16d3a430666797b648f68cc74d3332f369b55e17969d189aa6'
            unzip -q "$SOURCE_ZIP" -d work
            ROOT="$(dirname "$(find work -type f -name manifest.yaml | head -n 1)")"
            echo "ROOT=$ROOT"
            python -m pip install --quiet pyyaml
            python .ci/pagespec_041_prepare_patch.py --source .ci/pagespec_041_patch.py --output /tmp/pagespec_041_patch.py
            python /tmp/pagespec_041_patch.py "$ROOT"
            python .ci/pagespec_041_post_patch_fix.py "$ROOT"
            grep -F 'def _build_catalog_volume(self, volume: int, inherited_nonce: str)' "$ROOT/tools/render_page.py"
            grep -F 'class CatalogScriptNonceAudit(HTMLParser)' "$ROOT/tools/render_page.py"
          } > prepare_source.log 2>&1
          status=$?
          echo "$status" > prepare_source.status
          cat prepare_source.log
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PageSpec-0.4.1-prepare-source
          path: |
            prepare_source.log
            prepare_source.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce source generation
        shell: bash
        run: test "$(cat prepare_source.status)" = 0
