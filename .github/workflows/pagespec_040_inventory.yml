name: Inspect PageSpec 0.3.x source

on:
  push:
    branches:
      - build/pagespec-0.4.0-20260720
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download source delivery package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet gdown
          gdown --id 1QAgFPRx0LAPgZhufuh1OTJOKOTfXWc1Y -O pagespec_034_delivery.zip
          sha256sum pagespec_034_delivery.zip
          unzip -t pagespec_034_delivery.zip >/dev/null
          mkdir -p work/delivery
          unzip -q pagespec_034_delivery.zip -d work/delivery

      - name: Locate and extract source archive
        shell: bash
        run: |
          set -euo pipefail
          find work/delivery -maxdepth 4 -type f -printf '%p\t%s\n' | sort | tee work/delivery_files.txt
          SOURCE_ZIP="$(find work/delivery -type f -name '*完整源码*vendor*.zip' -o -name '*source*vendor*.zip' | head -n 1)"
          if [ -z "$SOURCE_ZIP" ]; then
            echo 'Source archive not found' >&2
            exit 1
          fi
          echo "SOURCE_ZIP=$SOURCE_ZIP" | tee work/source_location.txt
          mkdir -p work/source
          unzip -q "$SOURCE_ZIP" -d work/source
          find work/source -maxdepth 5 -type f -printf '%p\t%s\n' | sort | tee work/source_files.txt

      - name: Print project structure and key files
        shell: bash
        run: |
          set -euo pipefail
          echo '=== MANIFEST FILES ==='
          find work/source -type f \( -name 'manifest.yaml' -o -name 'manifest.yml' \) -print
          echo '=== TOOL FILES ==='
          find work/source -type f \( -path '*/tools/render_page.py' -o -path '*/tools/render_page.yaml' -o -path '*/tools/render_page.yml' \) -print
          echo '=== PAGESPEC FILES ==='
          find work/source -type f | grep -Ei 'pagespec|render|catalog|volume|schema|transport|recover|normaliz' | head -n 200 || true
          for f in $(find work/source -type f \( -name 'manifest.yaml' -o -path '*/tools/render_page.yaml' -o -path '*/tools/render_page.py' \) | head -n 10); do
            echo "=== BEGIN $f ==="
            sed -n '1,260p' "$f"
            echo "=== END $f ==="
          done

      - name: Upload inspection files
        uses: actions/upload-artifact@v4
        with:
          name: pagespec-034-inspection
          path: |
            work/delivery_files.txt
            work/source_location.txt
            work/source_files.txt
          if-no-files-found: error
          retention-days: 1
