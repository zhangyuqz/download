name: Recover PageSpec Candidate Run 14

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/pagespec_041_recover_run14.yml'

permissions:
  actions: read
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Download run-14 artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${GITHUB_REPOSITORY}/actions/artifacts/8471332548/zip > candidate.zip
          unzip -q candidate.zip -d recovered
          test -f recovered/pagespec_041_build.log
      - name: Store exact log
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: build/pagespec-0.4.1-20260721
        run: |
          content="$(base64 -w0 recovered/pagespec_041_build.log)"
          endpoint="repos/${GITHUB_REPOSITORY}/contents/.ci/generated/pagespec_041_build.log"
          existing="$(gh api "${endpoint}?ref=${TARGET_BRANCH}" --jq '.sha' 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            gh api "$endpoint" --method PUT -f message='ci: store run-14 diagnostics [skip ci]' -f content="$content" -f branch="$TARGET_BRANCH" -f sha="$existing" >/dev/null
          else
            gh api "$endpoint" --method PUT -f message='ci: store run-14 diagnostics [skip ci]' -f content="$content" -f branch="$TARGET_BRANCH" >/dev/null
          fi
