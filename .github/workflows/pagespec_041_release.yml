name: Release PageSpec 0.4.1

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout PageSpec 0.4.1 release scripts
        uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.1-20260721
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build, test, browser-audit and publish PageSpec 0.4.1
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: bash .ci/pagespec_041_build.sh

      - name: Upload PageSpec 0.4.1 delivery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PageSpec-0.4.1-delivery
          path: dist041/*
          if-no-files-found: warn
          retention-days: 7
