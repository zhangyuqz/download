name: Build PageSpec 0.4.1 Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout PageSpec 0.4.1 scripts
        uses: actions/checkout@v4
        with:
          ref: build/pagespec-0.4.1-20260721
          sparse-checkout: |
            .ci
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare executable patch and non-publishing candidate script
        shell: python
        run: |
          from pathlib import Path
          patch_path=Path('.ci/pagespec_041_patch.py')
          patch=patch_path.read_text(encoding='utf-8')
          patch=patch.replace("bootstrap = f" + "'''", "bootstrap = f" + '"""', 1)
          patch=patch.replace("final_bridge = f" + "'''", "final_bridge = f" + '"""', 1)
          patch=patch.replace("}})();</script>" + "'''", "}})();</script>" + '"""', 2)
          patch=patch.replace(
              "re.subn(pattern, replacement, text, count=1, flags=re.S)",
              "re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)",
              1,
          )
          patch=patch.replace(
              r"r'<script\\b(?![^>]*\\bnonce\\s*=)([^>]*)>'",
              r"r'<script\b(?![^>]*\bnonce\s*=)([^>]*)>'",
              1,
          )
          patch=patch.replace(r"r'<script\\b[^>]*>'", r"r'<script\b[^>]*>'")
          patch=patch.replace(
              r"missing_nonce = [tag[:200] for tag in script_tags if not re.search(r'\\bnonce\\s*=\\s*[\"\\\']', tag, flags=re.I)]",
              'missing_nonce = [tag[:200] for tag in script_tags if not re.search(r"nonce\\s*=", tag, flags=re.I)]',
              1,
          )
          patch=patch.replace(r"re.search(r'\\bnonce\\s*=',tag,re.I)", r"re.search(r'\bnonce\s*=',tag,re.I)", 1)
          compile(patch,str(patch_path),'exec')
          patch_path.write_text(patch,encoding='utf-8')

          source=Path('.ci/pagespec_041_build.sh').read_text(encoding='utf-8')
          source=source.replace(
              'python .ci/pagespec_041_patch.py "$PLUGIN_ROOT"\n',
              'python .ci/pagespec_041_patch.py "$PLUGIN_ROOT"\npython .ci/pagespec_041_post_patch_fix.py "$PLUGIN_ROOT"\n',
              1,
          )
          marker="echo '[11/11] Publish PageSpec 0.4.1 release and print exact identity'"
          if marker not in source:
              raise SystemExit('publish marker missing')
          source=source.split(marker,1)[0] + "echo '[11/11] Candidate build complete; publishing intentionally skipped'\nsha256sum dist041/* | sort | tee dist041/all_release_sha256.txt\necho \"CLI_TAG=$CLI_TAG\"\necho \"PACKAGE_BYTES=$(stat -c%s \\\"dist041/$PACKAGE\\\")\"\necho \"UNPACKED_BYTES=$UNPACKED_BYTES\"\n"
          Path('/tmp/pagespec_041_candidate.sh').write_text(source,encoding='utf-8')

      - name: Build, test and browser-audit PageSpec 0.4.1 candidate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash /tmp/pagespec_041_candidate.sh
