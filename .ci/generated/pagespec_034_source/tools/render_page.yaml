identity:
  name: render_page
  author: zhangyu
  label:
    en_US: Render Offline HTML from JSON (PageSpec)
    zh_Hans: 用 JSON 生成离线 HTML（PageSpec）
    zh_Hant: 用 JSON 生成離線 HTML（PageSpec）
description:
  human:
    en_US: Describe a page as a PageSpec v1 JSON (blocks of headings, text, charts, tables, images, etc.). The plugin authors all HTML/CSS/JS itself and returns one self-contained offline file. The user never writes HTML.
    zh_Hans: 用 PageSpec v1 的 JSON 描述一个页面（标题、文本、图表、表格、图片等"块"）。插件自己生成全部 HTML/CSS/JS，返回一个自包含的离线单文件。用户永不书写 HTML。
    zh_Hant: 用 PageSpec v1 的 JSON 描述頁面；插件自行生成全部 HTML/CSS/JS，回傳自包含離線單檔。
  llm: Build one offline self-contained HTML file from PageSpec v1 JSON. The closed language has 28 user content block types plus one fixed catalog verification block and no HTML/CSS/JS escape hatch. The input layer accepts common Dify wrappers, escaped strings, JSON-like text and safe Python/Jinja representations; ambiguity is resolved deterministically and recorded. Reference uploads only as {"type":"image","slot":1}. Never write URLs, HTML, CSS, JavaScript, ECharts option objects, or library names.
parameters:
  - name: spec
    type: string
    required: true
    label:
      en_US: PageSpec JSON
      zh_Hans: PageSpec JSON
      zh_Hant: PageSpec JSON
    human_description:
      en_US: A PageSpec v1 JSON string describing the page as blocks.
      zh_Hans: 描述页面内容的 PageSpec v1 JSON 字符串（详见规范）。
      zh_Hant: 描述頁面內容的 PageSpec v1 JSON 字串。
    llm_description: The full PageSpec v1 JSON as a string. Top level {"version":1,"doc":{...},"blocks":[...]}.
    form: llm
  - name: filename
    type: string
    required: false
    default: page.html
    label:
      en_US: Output file name
      zh_Hans: 输出文件名
      zh_Hant: 輸出檔名
    human_description:
      en_US: Output HTML file name (default page.html).
      zh_Hans: 输出 HTML 文件名（默认 page.html）。
      zh_Hant: 輸出 HTML 檔名（預設 page.html）。
    llm_description: Optional output file name ending in .html.
    form: llm
  - name: slot1
    type: file
    required: false
    label:
      en_US: Image slot 1
      zh_Hans: 图片插槽 1
      zh_Hant: 圖片插槽 1
    human_description:
      en_US: Optional image used by PageSpec image/gallery blocks that reference slot 1.
      zh_Hans: 可选图片；由 PageSpec 的 image/gallery 块通过 slot 1 引用。
      zh_Hant: 可選圖片；由 PageSpec 的 image/gallery 區塊透過 slot 1 引用。
    llm_description: Optional uploaded image for PageSpec slot 1. Never place image URLs in JSON.
    form: form
